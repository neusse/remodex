<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remodex Design Canvas</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#15181B; }
  body {
    display:flex; align-items:center; justify-content:center;
    color:#ECE9E1; font-family:system-ui,sans-serif;
  }
  .stub {
    text-align:center; padding:24px;
  }
  .stub h2 { font-size:20px; margin-bottom:8px; }
  .stub p { font-size:14px; color:#B9B3A8; }
</style>
</head>
<body>
<div class="stub">
  <h2>Design Canvas</h2>
  <p>OpenPencil mobile renderer will load here.</p>
</div>
<script>
(function() {
  try {
    if (window.AndroidCanvasBridge && typeof window.AndroidCanvasBridge.onCanvasReady === 'function') {
      window.AndroidCanvasBridge.onCanvasReady(JSON.stringify({
        renderer: 'openpencil-mobile',
        version: '0.1.0'
      }));
    }
  } catch(e) {
    console.error('CanvasBridge init failed:', e);
  }
})();
</script>
</body>
</html>
