<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, sans-serif;
    }
    .card {
      background: #15181D;
      border: 1px solid #2A2F38;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    #qr-area {
      width: 140px;
      height: 140px;
      background: #fff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #qr-area canvas {
      display: block;
    }
    button {
      padding: 6px 24px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: #35C759;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #2DB84E; }
    .note {
      color: #9AA4B2;
      font-size: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="qr-area"><span class="note">loading...</span></div>
    <button id="start-btn">Start</button>
  </div>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
